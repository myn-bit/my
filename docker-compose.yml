version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pc-store-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: pc_store
      MYSQL_USER: pcstore_user
      MYSQL_PASSWORD: userpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    container_name: pc-store-backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: mysql
      DB_USER: pcstore_user
      DB_PASSWORD: userpassword
      DB_NAME: pc_store
      JWT_SECRET: your-secret-key-here-change-in-production
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads

  adminer:
    image: adminer
    container_name: pc-store-adminer
    ports:
      - "8080:8080"
    depends_on:
      - mysql

volumes:
  mysql_data: