<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - PC Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(118, 75, 162, 0.15) 0%, transparent 50%);
            z-index: 0;
        }
        
        .auth-container {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 35px 30px;
            box-shadow: 
                0 20px 40px -10px rgba(0, 0, 0, 0.25),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 1;
            animation: containerAppear 0.6s ease-out;
        }
        
        @keyframes containerAppear {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
            color: #1a1a2e;
            text-decoration: none;
            transition: transform 0.3s ease;
        }
        
        .auth-logo:hover {
            transform: scale(1.03);
        }
        
        .logo-icon {
            font-size: 24px;
            color: #4f46e5;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .logo-text {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .auth-header h1 {
            font-size: 22px;
            color: #1a1a2e;
            margin-bottom: 5px;
        }
        
        .auth-header p {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 22px;
        }
        
        .auth-form .form-group {
            margin-bottom: 18px;
            position: relative;
        }
        
        .auth-form label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-weight: 500;
            font-size: 13px;
        }
        
        .auth-form input {
            width: 100%;
            padding: 12px 40px 12px 40px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 13px;
            color: #1a1a2e;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
        }
        
        .auth-form input::placeholder {
            color: #94a3b8;
            font-size: 13px;
        }
        
        .auth-form input:focus {
            outline: none;
            border-color: #4f46e5;
            background: white;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        .btn-register {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 5px;
            font-family: 'Inter', sans-serif;
        }
        
        .btn-register:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.2);
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 22px;
            color: #666;
            padding-top: 22px;
            border-top: 1px solid #e2e8f0;
        }
        
        .auth-footer p {
            font-size: 13px;
            margin-bottom: 8px;
        }
        
        .auth-footer a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .auth-footer a:hover {
            color: #4338ca;
            text-decoration: underline;
        }
        
        .message {
            padding: 12px;
            margin: 12px 0;
            border-radius: 10px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            animation: slideIn 0.3s ease;
        }
        
        .success {
            background: #f0fdf4;
            border: 1.5px solid #86efac;
            color: #166534;
        }
        
        .error {
            background: #f8d7da;
            border: 1.5px solid #f5c6cb;
            color: #721c24;
        }
        
        .password-eye {
            position: absolute;
            right: 12px;
            top: 55%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 14px;
            padding: 0;
            transition: color 0.2s ease;
            z-index: 2;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .password-eye:hover {
            color: #4f46e5;
        }
        
        .decoration {
            position: absolute;
            z-index: 0;
            pointer-events: none;
        }
        
        .decoration-1 {
            width: 160px;
            height: 160px;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.1) 0%, rgba(124, 58, 237, 0.1) 100%);
            border-radius: 50%;
            top: 10%;
            left: 10%;
            filter: blur(35px);
            animation: float 20s ease-in-out infinite;
        }
        
        .decoration-2 {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(139, 92, 246, 0.1) 100%);
            border-radius: 50%;
            bottom: 10%;
            right: 10%;
            filter: blur(35px);
            animation: float 15s ease-in-out infinite reverse;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            33% {
                transform: translate(20px, -20px) rotate(120deg);
            }
            66% {
                transform: translate(-15px, 15px) rotate(240deg);
            }
        }
        
        @media (max-width: 480px) {
            .auth-container {
                padding: 25px 20px;
                margin: 5px;
                max-width: 360px;
            }
            
            .auth-header h1 {
                font-size: 20px;
            }
            
            .auth-header p {
                font-size: 12px;
            }
            
            .auth-form input {
                padding: 11px 38px 11px 38px;
                font-size: 12px;
            }
            
            .auth-form input::placeholder {
                font-size: 12px;
            }
            
            .btn-register {
                padding: 12px;
                font-size: 13px;
            }
            
            .auth-footer p {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>
    
    <div class="auth-container">
        <div class="auth-header">
            <a href="index.html" class="auth-logo">
                <i class="fas fa-desktop logo-icon"></i>
                <span class="logo-text">PC<span style="color: #4f46e5;">Store</span></span>
            </a>
            <h1><i class="fas fa-user-plus"></i> Регистрация</h1>
            <p>Создайте новый аккаунт</p>
        </div>
        
        <div id="message" class="message" style="display: none;"></div>
        
        <form class="auth-form" id="registerForm">
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Имя пользователя</label>
                <input type="text" id="username" name="username" required 
                       placeholder="Имя пользователя">
            </div>
            
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" name="email" required 
                       placeholder="Ваш email">
            </div>
            
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Пароль</label>
                <input type="password" id="password" name="password" required 
                       placeholder="Пароль">
                <button type="button" class="password-eye" id="togglePassword">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword"><i class="fas fa-lock"></i> Подтвердите пароль</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required 
                       placeholder="Повторите пароль">
                <button type="button" class="password-eye" id="toggleConfirmPassword">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            
            <button type="submit" class="btn-register">
                <i class="fas fa-user-plus"></i> Зарегистрироваться
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
            <p><a href="index.html"><i class="fas fa-home"></i> Вернуться на главную</a></p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('registerForm');
            const togglePassword = document.getElementById('togglePassword');
            const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
            });
            
            toggleConfirmPassword.addEventListener('click', function() {
                const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                confirmPasswordInput.setAttribute('type', type);
                this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
            });
            
            registerForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const username = document.getElementById('username').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                
                if (password !== confirmPassword) {
                    showMessage('Пароли не совпадают!', 'error');
                    return;
                }
                
                if (password.length < 6) {
                    showMessage('Пароль должен содержать минимум 6 символов', 'error');
                    return;
                }
                
                const submitBtn = this.querySelector('button[type="submit"]');
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Регистрация...';
                submitBtn.disabled = true;
                
                try {
                    const response = await fetch('http://localhost:3001/api/register', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            username: username,
                            email: email,
                            password: password
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        showMessage('✅ Регистрация успешна! Аккаунт создан.', 'success');
                        
                        localStorage.setItem('user', JSON.stringify(data.user));
                        
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 2000);
                    } else {
                        showMessage('❌ ' + data.message, 'error');
                    }
                } catch (error) {
                    console.error('Ошибка регистрации:', error);
                    showMessage('❌ Ошибка подключения к серверу. Проверьте запущен ли backend сервер.', 'error');
                } finally {
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            });
            
            function showMessage(text, type) {
                const messageDiv = document.getElementById('message');
                messageDiv.textContent = text;
                messageDiv.className = 'message ' + type;
                messageDiv.style.display = 'block';
                
                if (type === 'success') {
                    setTimeout(() => {
                        messageDiv.style.display = 'none';
                    }, 5000);
                }
            }
            
            window.addEventListener('load', async () => {
                try {
                    const response = await fetch('http://localhost:3001/api/test');
                    if (response.ok) {
                        console.log('✅ Сервер доступен');
                    }
                } catch (error) {
                    console.warn('⚠️ Сервер не отвечает, но регистрация будет пробовать подключиться');
                }
            });
        });
    </script>
</body>
</html>
