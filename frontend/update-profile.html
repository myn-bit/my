<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование профиля | PC Store</title>
    <link rel="stylesheet" href="profile.css">
    <style>
        .update-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .back-link:hover {
            color: var(--primary-dark);
        }
        
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--gray);
            cursor: pointer;
        }
        
        .password-input-wrapper {
            position: relative;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="profile.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Назад к профилю
        </a>
        
        <div class="update-container">
            <h1 style="margin-bottom: 30px; color: var(--dark);">Редактирование профиля</h1>
            
            <form id="updateProfileForm">
                <div class="form-group">
                    <label class="form-label">Имя пользователя</label>
                    <input type="text" class="form-input" id="updateUsername" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="updateEmail" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Текущий пароль (для подтверждения изменений)</label>
                    <div class="password-input-wrapper">
                        <input type="password" class="form-input" id="currentPassword">
                        <button type="button" class="password-toggle" onclick="togglePassword('currentPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <hr style="margin: 30px 0; border: none; border-top: 1px solid var(--border);">
                
                <h3 style="margin-bottom: 20px;">Смена пароля (необязательно)</h3>
                
                <div class="form-group">
                    <label class="form-label">Новый пароль</label>
                    <div class="password-input-wrapper">
                        <input type="password" class="form-input" id="newPassword">
                        <button type="button" class="password-toggle" onclick="togglePassword('newPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Подтвердите новый пароль</label>
                    <div class="password-input-wrapper">
                        <input type="password" class="form-input" id="confirmNewPassword">
                        <button type="button" class="password-toggle" onclick="togglePassword('confirmNewPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="window.location.href='profile.html'">
                        Отмена
                    </button>
                    <button type="submit" class="btn btn-primary">
                        Сохранить изменения
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Загружаем данные профиля
            const userData = JSON.parse(localStorage.getItem('user') || '{}');
            const user = userData.user;
            
            if (user) {
                document.getElementById('updateUsername').value = user.username || '';
                document.getElementById('updateEmail').value = user.email || '';
            }
            
            // Обработка формы
            document.getElementById('updateProfileForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const username = document.getElementById('updateUsername').value.trim();
                const email = document.getElementById('updateEmail').value.trim();
                const currentPassword = document.getElementById('currentPassword').value.trim();
                const newPassword = document.getElementById('newPassword').value.trim();
                const confirmNewPassword = document.getElementById('confirmNewPassword').value.trim();
                
                // Проверка пароля
                if (newPassword && newPassword !== confirmNewPassword) {
                    alert('Новые пароли не совпадают');
                    return;
                }
                
                // Здесь будет логика обновления профиля
                try {
                    const response = await fetch('/api/profile/update', {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${userData.token}`
                        },
                        body: JSON.stringify({
                            username,
                            email,
                            currentPassword,
                            newPassword: newPassword || undefined
                        })
                    });
                    
                    if (response.ok) {
                        alert('Профиль успешно обновлен');
                        window.location.href = 'profile.html';
                    } else {
                        const error = await response.json();
                        alert(error.message || 'Ошибка обновления профиля');
                    }
                } catch (error) {
                    console.error('Ошибка:', error);
                    alert('Ошибка обновления профиля');
                }
            });
        });
        
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const button = input.parentNode.querySelector('.password-toggle i');
            
            if (input.type === 'password') {
                input.type = 'text';
                button.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                button.className = 'fas fa-eye';
            }
        }
    </script>
</body>
</html>
